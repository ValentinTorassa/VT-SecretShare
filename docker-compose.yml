# Local stack: app + Redis. On valenpi swap `docker compose` for `podman compose`.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # secrets are ephemeral; don't persist to disk
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      REDIS_ADDR: redis:6379
      BASE_URL: ${BASE_URL:-http://localhost:8080}
    depends_on:
      - redis
    restart: unless-stopped
